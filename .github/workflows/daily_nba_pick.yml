name: Daily NBA Pick

on:
  schedule:
    # 12:00 hs Argentina (UTC-3) = 15:00 UTC — único envío diario
    - cron: "0 15 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-picks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NBA pick bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          BALLDONTLIE_API_KEY: ${{ secrets.BALLDONTLIE_KEY }}
          SPORTSDATA_API_KEY: ${{ secrets.SPORTSDATA_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python main.py

      - name: Save picks history to repo
        run: |
          git config user.name "NBA Bot [automated]"
          git config user.email "bot@noreply.github.com"
          git pull --rebase origin main || true
          git add data/picks_history.json || true
          git diff --staged --quiet || git commit -m "chore: picks history $(date +%Y-%m-%d) [skip ci]"
          git push origin main || true
